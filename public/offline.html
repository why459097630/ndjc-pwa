<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    >
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Customer Hub">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <title>Offline · Customer Hub</title>
    <style>
      :root {
        color-scheme: light;
        background: #eef5f2;
        color: #111827;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 0;
        height: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background: #eef5f2;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        padding: 28px;
        text-align: center;
      }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ecfdf5;
        color: #059669;
        font-size: 34px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        color: #111827;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      p {
        margin: 12px 0 0;
        color: #4b5563;
        font-size: 14px;
        line-height: 1.6;
        font-weight: 600;
      }

      button {
        width: 100%;
        margin-top: 22px;
        border: 0;
        border-radius: 999px;
        background: #10b981;
        color: #ffffff;
        padding: 14px 18px;
        font-size: 15px;
        line-height: 1;
        font-weight: 900;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      button:active {
        transform: scale(0.98);
      }

      .hint {
        margin-top: 14px;
        color: #9ca3af;
        font-size: 12px;
        line-height: 1.5;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">N</div>
      <h1>You are offline</h1>
      <p>The app shell is available, but live cloud data needs an internet connection. Reconnect and refresh to continue.</p>
      <button type="button" onclick="window.location.reload()">Refresh</button>
      <div class="hint">Customer Hub · Offline App Shell</div>
    </main>
  </body>
</html>
